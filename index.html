<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>生理訊號特徵工程微學習平台 - 討論區整合版</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        header { background-color: #1e293b; color: white; padding: 15px 30px; border-radius: 8px; margin-bottom: 20px; }
        header h1 { margin: 0; font-size: 24px; }
        header p { margin: 5px 0 0 0; color: #94a3b8; font-size: 14px; }
        .panel { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #0f172a; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; font-size: 18px; }
        .unit-btn { display: block; width: 100%; text-align: left; padding: 12px; margin-bottom: 10px; border: 1px solid #cbd5e1; border-radius: 6px; background-color: #f8fafc; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .unit-btn:hover { background-color: #edf2f7; border-color: #94a3b8; }
        .unit-btn.active { background-color: #3b82f6; color: white; border-color: #2563eb; }
        #formula-box { background: #f8fafc; padding: 10px; border-left: 4px solid #3b82f6; margin: 15px 0; overflow-x: auto; }
        textarea.code-editor { width: 100%; height: 260px; font-family: 'Courier New', Courier, monospace; font-size: 14px; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; background-color: #1e1e1e; color: #d4d4d4; resize: vertical; }
        .btn-submit { background-color: #10b981; color: white; border: none; padding: 12px 24px; font-size: 14px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: background 0.2s; }
        .btn-submit:hover { background-color: #059669; }
        .result-card { margin-top: 15px; padding: 15px; border-radius: 6px; display: none; }
        .status-Accepted { background-color: #d1fae5; color: #065f46; border: 1px solid #34d399; }
        .status-Error { background-color: #fee2e2; color: #991b1b; border: 1px solid #f87171; }
        .scaffold-card { margin-top: 15px; padding: 15px; background-color: #eff6ff; border: 1px solid #bfdbfe; border-radius: 6px; color: #1e40af; display: none; }
        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .metric-card { background: #f1f5f9; padding: 15px; border-radius: 6px; text-align: center; border: 1px solid #e2e8f0; }
        .metric-value { font-size: 24px; font-weight: bold; color: #1e3a8a; margin-top: 5px; }
        .knowledge-content { line-height: 1.7; color: #334155; display: none; }
        
        /* 討論區專用樣式 */
        .discussion-panel { margin-top: 30px; border-top: 2px solid #e2e8f0; padding-top: 20px; }
        .comment-list { max-height: 250px; overflow-y: auto; margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 6px; padding: 10px; background-color: #f8fafc; }
        .comment-item { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #e2e8f0; }
        .comment-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .comment-meta { font-size: 12px; color: #64748b; margin-bottom: 4px; }
        .comment-text { font-size: 14px; color: #0f172a; }
        .comment-input-area { display: flex; gap: 10px; }
        .comment-input { flex-grow: 1; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; resize: vertical; min-height: 40px; font-family: inherit; }
        .btn-comment { background-color: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .btn-comment:hover { background-color: #2563eb; }
    </style>
</head>
<body>

<header>
    <h1>生理訊號時域特徵工程微學習平台</h1>
    <p>控制端工作站 — 包含互動討論區之數位學習環境</p>
</header>

<div class="container">
    <div>
        <div class="panel" style="margin-bottom: 20px;">
            <h2>工廠全景導覽</h2>
            <div id="unit-list"></div>
        </div>
        
        <div class="panel">
            <h2>管理端儀表板</h2>
            <div class="metrics-grid">
                <div class="metric-card">
                    <div style="font-size: 12px; color: #64748b;">精熟達成率</div>
                    <div class="metric-value" id="global-mastery">0.00%</div>
                </div>
                <div class="metric-card">
                    <div style="font-size: 12px; color: #64748b;">全班平均錯誤率</div>
                    <div class="metric-value" id="global-error">0.00%</div>
                </div>
            </div>
        </div>
    </div>

    <div class="panel">
        <h2 id="workstation-title">運算工作站</h2>
        
        <div id="knowledge-area" class="knowledge-content">
            <p>心率變異度（HRV）是指連續心跳之間時間間隔的微小波動與變化程度。請從左側導覽列選擇實作單元開始練習。</p>
        </div>

        <div id="practice-area">
            <p id="unit-desc">載入中...</p>
            <div id="formula-box">學理公式加載中...</div>
            <div id="scaffold-box" class="scaffold-card"></div>
            
            <h2 style="margin-top: 20px; font-size: 16px;">演算法編寫沙盒 (Python 3)</h2>
            <textarea id="code-editor" class="code-editor" spellcheck="false"></textarea>
            <button class="btn-submit" onclick="submitCode()">提交至雲端品質檢定中心</button>
            <div id="result-box" class="result-card"></div>
            
            <div class="discussion-panel">
                <h2 style="font-size: 16px;">單元討論區 (Mentoring & Discussion)</h2>
                <div id="comments-list" class="comment-list">
                    載入留言中...
                </div>
                <div class="comment-input-area">
                    <textarea id="new-comment-text" class="comment-input" placeholder="在此輸入探討演算法細節或提問..."></textarea>
                    <button class="btn-comment" onclick="postComment()">發布留言</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const unitsData = {
        "1": {
            "unit_id": "1",
            "title": "時域 HRV 特徵 - RMSSD 實作",
            "formula": "$$RMSSD = \\sqrt{\\frac{1}{N-1} \\sum_{i=1}^{N-1} (RR_{i+1} - RR_i)^2}$$",
            "description": "請實作 'calculate_features(rr_intervals)' 函式，計算相鄰 RR 間期差值之均方根值。",
            "template": "def calculate_features(rr_intervals):\n    if len(rr_intervals) < 2:\n        return 0.0\n    diff_squares = [(rr_intervals[i+1] - rr_intervals[i]) ** 2 for i in range(len(rr_intervals) - 1)]\n    return math.sqrt(sum(diff_squares) / len(diff_squares))",
            "hints": ["提示等級 1：注意長度小於 2 的狀況。", "提示等級 2：先算差值平方，除以 N-1 取得均值，再開根號。"]
        },
        "2": {
            "unit_id": "2",
            "title": "時域 HRV 特徵 - SDNN 實作",
            "formula": "$$SDNN = \\sqrt{\\frac{1}{N} \\sum_{i=1}^{N} (RR_i - \\overline{RR})^2}$$",
            "description": "請實作 'calculate_features(rr_intervals)' 函式，計算標準 NN 間期之總體標準差。",
            "template": "def calculate_features(rr_intervals):\n    n = len(rr_intervals)\n    if n == 0:\n        return 0.0\n    mean_val = sum(rr_intervals) / n\n    variance = sum((x - mean_val) ** 2 for x in rr_intervals) / n\n    return math.sqrt(variance)",
            "hints": ["提示等級 1：長度為 0 應回傳 0.0。", "提示等級 2：SDNN 分母採用總個數 N。"]
        },
        "3": {
            "unit_id": "3",
            "title": "時域 HRV 特徵 - pNN50 實作",
            "formula": "$$pNN50 = \\frac{NN50}{總間期差值數} \\times 100\\%$$",
            "description": "請實作 'calculate_features(rr_intervals)' 函式。計算絕對差值超過 50 毫秒的個數佔比。",
            "template": "def calculate_features(rr_intervals):\n    if len(rr_intervals) < 2:\n        return 0.0\n    count_50 = 0\n    for i in range(len(rr_intervals) - 1):\n        diff = abs(rr_intervals[i+1] - rr_intervals[i])\n        if diff > 50:\n            count_50 += 1\n    return (count_50 / (len(rr_intervals) - 1)) * 100",
            "hints": ["提示等級 1：長度小於 2 應回傳 0.0。", "提示等級 2：計算大於 50 的次數，最後乘以 100。"]
        }
    };

    let currentUnitId = "knowledge";
    let errorTracker = { "1": 0, "2": 0, "3": 0 };

    window.onload = function() {
        renderUnits();
        switchUnit("knowledge");
    };

    function renderUnits() {
        const listContainer = document.getElementById("unit-list");
        listContainer.innerHTML = "";
        
        const kmBtn = document.createElement("button");
        kmBtn.className = `unit-btn` + (currentUnitId === "knowledge" ? " active" : "");
        kmBtn.id = "btn-knowledge";
        kmBtn.innerText = "基本學理：HRV 自律神經導論";
        kmBtn.onclick = () => switchUnit("knowledge");
        listContainer.appendChild(kmBtn);
        
        Object.values(unitsData).forEach(unit => {
            const btn = document.createElement("button");
            btn.className = `unit-btn` + (unit.unit_id === currentUnitId ? ' active' : '');
            btn.id = `btn-${unit.unit_id}`;
            btn.innerText = unit.title;
            btn.onclick = () => switchUnit(unit.unit_id);
            listContainer.appendChild(btn);
        });
    }

    function switchUnit(unitId) {
        document.querySelectorAll(".unit-btn").forEach(b => b.classList.remove("active"));
        const activeBtn = document.getElementById(`btn-${unitId}`);
        if(activeBtn) activeBtn.classList.add("active");
        
        currentUnitId = unitId;
        const knowledgeArea = document.getElementById("knowledge-area");
        const practiceArea = document.getElementById("practice-area");
        const resultBox = document.getElementById("result-box");
        
        if (unitId === "knowledge") {
            document.getElementById("workstation-title").innerText = "學理導讀中心";
            practiceArea.style.display = "none";
            knowledgeArea.style.display = "block";
            resultBox.style.display = "none";
        } else {
            practiceArea.style.display = "block";
            knowledgeArea.style.display = "none";
            
            const unit = unitsData[unitId];
            document.getElementById("workstation-title").innerText = `運算工作站 — ${unit.title}`;
            document.getElementById("unit-desc").innerText = unit.description;
            document.getElementById("formula-box").innerHTML = unit.formula;
            document.getElementById("code-editor").value = unit.template;
            resultBox.style.display = "none";
            
            updateScaffolding();
            loadComments(unitId); // 切換單元時動態讀取留言
        }
        
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    }

    function updateScaffolding() {
        const scaffoldBox = document.getElementById("scaffold-box");
        const currentErrors = errorTracker[currentUnitId];
        const hints = unitsData[currentUnitId].hints;

        if (currentErrors === 1) {
            scaffoldBox.style.display = "block";
            scaffoldBox.innerHTML = `<strong>鷹架介入：</strong><br>${hints[0]}`;
        } else if (currentErrors >= 2) {
            scaffoldBox.style.display = "block";
            scaffoldBox.innerHTML = `<strong>進階鷹架：</strong><br>${hints[0]}<br><br>${hints[1]}`;
        } else {
            scaffoldBox.style.display = "none";
        }
    }

    // 讀取單元留言邏輯
    async function loadComments(unitId) {
        const commentsList = document.getElementById("comments-list");
        commentsList.innerHTML = "讀取中...";
        try {
            const response = await fetch(`/api/comments?unit_id=${unitId}`);
            if (response.ok) {
                const comments = await response.json();
                commentsList.innerHTML = "";
                if (comments.length === 0) {
                    commentsList.innerHTML = "<div class='comment-item'><div class='comment-text'>目前無討論紀錄，成為第一個發問者。</div></div>";
                    return;
                }
                comments.forEach(c => {
                    commentsList.innerHTML += `
                        <div class="comment-item">
                            <div class="comment-meta">${c.user} • ${c.timestamp}</div>
                            <div class="comment-text">${c.content}</div>
                        </div>`;
                });
                commentsList.scrollTop = commentsList.scrollHeight;
            }
        } catch (err) {
            commentsList.innerHTML = "留言讀取失敗。";
        }
    }

    // 發布單元留言邏輯
    async function postComment() {
        const textInput = document.getElementById("new-comment-text");
        const content = textInput.value.trim();
        if (!content) return;

        try {
            const response = await fetch('/api/comments', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ unit_id: currentUnitId, content: content })
            });
            if (response.ok) {
                textInput.value = "";
                loadComments(currentUnitId); // 重新載入以顯示新留言
            }
        } catch (err) {
            alert("發布失敗，請確認網路狀態。");
        }
    }

    async function submitCode() {
        const code = document.getElementById("code-editor").value;
        const resultBox = document.getElementById("result-box");
        
        resultBox.style.display = "block";
        resultBox.className = "result-card";
        resultBox.innerText = "檢定校驗中...";

        try {
            const response = await fetch('/api/evaluate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ unit_id: currentUnitId, code: code })
            });
            
            const resData = await response.json();
            
            if (resData.status === "Accepted") {
                resultBox.className = "result-card status-Accepted";
                resultBox.innerHTML = `<strong>檢定通過</strong><br>通過測資數: ${resData.passed_cases}/${resData.total_cases}<br>錯誤率: ${resData.error_rate}%`;
                errorTracker[currentUnitId] = 0;
            } else {
                resultBox.className = "result-card status-Error";
                resultBox.innerHTML = `<strong>未通過 (${resData.status})</strong><br>訊息: ${resData.error_message || '數值不匹配'}<br>錯誤率: ${resData.error_rate}%`;
                errorTracker[currentUnitId] += 1;
            }
            
            updateScaffolding();
            document.getElementById("global-mastery").innerText = `${resData.global_mastery_rate}%`;
            document.getElementById("global-error").innerText = `${resData.global_average_error_rate}%`;

        } catch (err) {
            resultBox.className = "result-card status-Error";
            resultBox.innerText = "服務未回應。";
        }
    }
</script>
</body>
</html>
